services:
  - type: web
    name: wedding-hall-api
    runtime: node
    buildCommand: npm install && npm run build && npm run db:migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: '10'
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
